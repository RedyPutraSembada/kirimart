# ============================================
# KiriMart Docker Compose
# ============================================
#
# Menjalankan Redis dan WebSocket Server secara bersamaan.
# Next.js TIDAK dimasukkan ke Docker (tetap pakai `bun dev` seperti biasa).
#
# Cara pakai:
#   docker compose up --build       → Build & jalankan semua
#   docker compose up -d            → Jalankan di background
#   docker compose down             → Stop semua
#   docker compose logs ws-server   → Lihat log WS Server
#   docker compose logs redis       → Lihat log Redis
#
# ============================================

services:
  # ──────────────────────────────────────────
  # REDIS — Cache, Pub/Sub, Queue (BullMQ)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kirimart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # Perintah: aktifkan persistence agar data tidak hilang saat restart
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────
  # WS-SERVER — WebSocket + REST emit endpoint
  # ──────────────────────────────────────────
  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: kirimart-ws
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - WS_SECRET=kirimart-ws-secret-2026
      # DATABASE_URL harus mengarah ke PostgreSQL HOST machine (bukan localhost di container)
      # Karena PostgreSQL berjalan di Windows Anda, bukan di Docker.
      # "host.docker.internal" = IP komputer host dari sudut pandang container Docker.
      - DATABASE_URL=postgres://postgres:root@host.docker.internal:5432/kirimart
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

# ──────────────────────────────────────────
# VOLUMES — Data persisten Redis
# ──────────────────────────────────────────
volumes:
  redis-data:
    driver: local
