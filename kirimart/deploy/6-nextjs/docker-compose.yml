services:
  nextjs:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: kb-nextjs
    restart: unless-stopped
    env_file:
      - ../.env.production
    networks:
      - kawanbelanja-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  kawanbelanja-net:
    external: true
