services:
  ws-server:
    build:
      context: ../../ws-server
      dockerfile: Dockerfile
    container_name: kb-ws
    restart: unless-stopped
    env_file:
      - ../.env.production
    networks:
      - kawanbelanja-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  kawanbelanja-net:
    external: true
